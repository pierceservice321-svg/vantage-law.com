<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Law | Client Testimonials</title>
    <style>
        body { background-color: #ffffff; color: #000; font-family: "Garamond", serif; margin: 0; padding: 60px 20px; line-height: 1.6; overflow-x: hidden; }
        .container { max-width: 650px; margin: auto; position: relative; }
        
        header { display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #000; padding-bottom: 30px; margin-bottom: 50px; }
        .logo-icon { width: 35px; height: 35px; background-color: #8B4513; border-radius: 50%; margin-right: 15px; flex-shrink: 0; }
        h1 { font-size: 2.2rem; letter-spacing: 8px; text-transform: uppercase; margin: 0; font-weight: bold; }
        
        .form-section { background: #f9f9f9; padding: 40px; border: 1px solid #eee; margin-bottom: 40px; }
        .form-intro { font-family: monospace; font-size: 0.95rem; text-align: left; margin-bottom: 30px; font-weight: bold; border-left: 4px solid #8B4513; padding-left: 15px; }
        
        .stars-input { display: flex; flex-direction: row-reverse; justify-content: center; margin-bottom: 25px; }
        .stars-input input { display: none; }
        .stars-input label { font-size: 2.2rem; color: #ccc; cursor: pointer; padding: 0 8px; }
        .stars-input label:hover, .stars-input label:hover ~ label, .stars-input input:checked ~ label { color: #000; }
        
        textarea { width: 100%; border: 1px solid #ccc; padding: 15px; box-sizing: border-box; font-family: serif; font-size: 1rem; margin-bottom: 15px; height: 100px; outline: none; resize: none; }
        button { background: #000; color: #fff; border: none; padding: 15px 30px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; width: 100%; font-weight: bold; }

        /* --- 展示區 --- */
        .display-wrapper {
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-top: 1px dashed #ccc;
            margin-top: 30px;
            position: relative; /* 為了讓彈窗相對於此容器 */
        }

        #reviewContent { transition: opacity 0.6s; opacity: 0; width: 100%; }
        .review-stars { font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 5px; }
        .review-text { font-size: 1.4rem; font-weight: bold; line-height: 1.5; padding: 0 20px; }
        .system-tag { font-family: monospace; font-size: 0.95rem; color: #999; margin-top: 10px; display: block; }

        /* --- 彈出視窗樣式 --- */
        #popupRebuttal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 85%;
            background: rgba(0, 0, 0, 0.95); /* 深色背景 */
            color: #fff;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: monospace;
            text-align: left;
            border-left: 5px solid #8B4513;
        }

        #popupRebuttal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .popup-label { color: #8B4513; font-weight: bold; display: block; margin-bottom: 10px; font-size: 0.8rem; letter-spacing: 2px; }
        .popup-msg { font-size: 0.95rem; line-height: 1.6; }

        .view-all { text-align: center; margin-top: 60px; }
        .view-all a { color: #000; text-decoration: none; border-bottom: 1px solid #000; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-icon"></div>
        <h1>Vantage Law</h1>
    </header>

    <section class="form-section">
        <div class="form-intro">&gt; 數據採集終端已就緒。</div>
        <form id="gform">
            <div class="stars-input">
                <input type="radio" id="s5" name="rating" value="5星"><label for="s5">★</label>
                <input type="radio" id="s4" name="rating" value="4星"><label for="s4">★</label>
                <input type="radio" id="s3" name="rating" value="3星"><label for="s3">★</label>
                <input type="radio" id="s2" name="rating" value="2星"><label for="s2">★</label>
                <input type="radio" id="s1" name="rating" value="1星"><label for="s1">★</label>
            </div>
            <textarea id="comment" placeholder="輸入匿名證言..." required></textarea>
            <button type="button" onclick="handleCustomSubmit()">Submit Testimony</button>
        </form>
    </section>

    <div class="display-wrapper">
        <div id="reviewContent"></div>
        
        <div id="popupRebuttal">
            <span class="popup-label">&gt; ATTORNEY'S REBUTTAL</span>
            <div class="popup-msg" id="popupMsg"></div>
        </div>
    </div>

    <div class="view-all">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdRyyw8BKgIsloQkhxEAqRBOUFS3MffXFZ1vNhI-f1zA5RoYw/viewanalytics" target="_blank">Access Archives →</a>
    </div>
</div>

<script>
    const reviews = [
        { id: "01", text: "他居然在法庭上說對方的律師長得像猴子。我輸了官司，但他看起來很爽。", reply: "更正：是對靈長類動物的冒犯。我事後已向動物園致歉。" },
        { id: "05", text: "他在事務所裡抽雪茄，還把煙吐在我臉上，說這叫『法律的薰陶』。", reply: "高品質煙霧有助於過濾廢話。建議列入諮詢費。" },
        { id: "08", text: "他在合約裡加了一條：如果他贏了，我要跪著付錢。", reply: "這叫尊重專業。下次請自備護膝。" },
        { id: "10", text: "他說我的長相就是一種犯罪，建議我直接認罪。", reply: "我是在幫你節省公帑，法官看到你的臉會判更重。" },
        { id: "13", text: "他在開庭時用手機訂外送，還問法官要不要吃漢堡。", reply: "飢餓會導致誤判，我這是在維護司法正義。" },
        { id: "15", text: "他說我的案子唯一的亮點就是我那愚蠢的勇氣。", reply: "勇氣可嘉，但支票簿的厚度才決定這場官司的勝負。" },
        { id: "16", text: "他在事務所裡養了一隻食人魚，還叫我的名字。", reply: "牠比你聽話，而且從不詢問能不能打折。" },
        { id: "19", text: "他在開庭時全程戴墨鏡，說對面的愚蠢閃到了他的眼睛。", reply: "保護視力是律師的職業本能。對面真的很瞎。" }
    ];

    const contentDiv = document.getElementById('reviewContent');
    const popup = document.getElementById('popupRebuttal');
    const popupMsg = document.getElementById('popupMsg');

    function cycleReview() {
        // 1. 隱藏舊內容
        contentDiv.style.opacity = 0;
        popup.classList.remove('show');

        setTimeout(() => {
            const rev = reviews[Math.floor(Math.random() * reviews.length)];
            
            // 2. 顯示負評
            contentDiv.innerHTML = `
                <div class="review-stars">★☆☆☆☆</div>
                <div class="review-text">「${rev.text}」</div>
                <span class="system-tag">[SYSTEM] : 檔案編號 #VNTG-${rev.id}</span>
            `;
            contentDiv.style.opacity = 1;

            // 3. 延遲 1.5 秒彈出回覆
            setTimeout(() => {
                popupMsg.innerText = rev.reply;
                popup.classList.add('show');
            }, 1500);

        }, 800);
    }

    // 每 7 秒切換一次（給彈窗留足夠時間）
    setInterval(cycleReview, 7000);
    window.onload = cycleReview;

    function handleCustomSubmit() {
        const comment = document.getElementById('comment').value;
        if(!comment) return;
        
        alert("證言錄入成功。");
        
        contentDiv.style.opacity = 0;
        popup.classList.remove('show');

        setTimeout(() => {
            contentDiv.innerHTML = `
                <div class="review-stars">★★★☆☆</div>
                <div class="review-text">「${comment}」</div>
                <span class="system-tag">[SYSTEM] : 檔案編號 #VNTG-LIVE</span>
            `;
            contentDiv.style.opacity = 1;

            setTimeout(() => {
                popupMsg.innerText = "已攔截。本系統拒絕處理這種充滿情緒化的垃圾信息。";
                popup.classList.add('show');
            }, 1500);
        }, 800);
        document.getElementById('comment').value = "";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Law | Client Testimonials</title>
    <style>
        body { background-color: #ffffff; color: #000; font-family: "Garamond", serif; margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 500px; margin: auto; }
        
        /* 手機版縮小標題 */
        header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; letter-spacing: 5px; text-transform: uppercase; margin: 0; font-weight: bold; }
        .intro { font-family: serif; margin-top: 10px; color: #333; font-size: 0.85rem; line-height: 1.4; }
        
        .form-section { background: #f9f9f9; padding: 20px; border: 1px solid #eee; margin-bottom: 20px; }
        .form-intro { font-family: monospace; color: #000; font-size: 0.8rem; text-align: center; margin-bottom: 5px; font-weight: bold; }
        
        /* 評分上移並縮小 */
        .stars-input { display: flex; flex-direction: row-reverse; justify-content: center; margin-bottom: 10px; }
        .stars-input input { display: none; }
        .stars-input label { font-size: 1.5rem; color: #ccc; cursor: pointer; padding: 0 4px; transition: 0.2s; }
        .stars-input label:hover, .stars-input label:hover ~ label, .stars-input input:checked ~ label { color: #000; }
        
        textarea { width: 100%; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; font-family: serif; font-size: 0.95rem; margin-bottom: 10px; height: 80px; outline: none; border-radius: 0; resize: none; }
        button { background: #000; color: #fff; border: none; padding: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; width: 100%; font-weight: bold; font-size: 0.85rem; }

        .display-wrapper { height: 180px; display: flex; align-items: center; justify-content: center; text-align: center; border-top: 1px solid #eee; margin-top: 15px; position: relative; padding: 10px; }
        #reviewDisplay { transition: opacity 0.5s ease-in-out; opacity: 0; width: 100%; }
        .review-stars { font-size: 0.75rem; margin-bottom: 8px; letter-spacing: 2px; color: #000; }
        .review-text { font-size: 1rem; margin-bottom: 5px; font-weight: bold; font-style: italic; }
        .review-subtext { font-size: 0.7rem; color: #999; font-family: monospace; text-transform: uppercase; }

        @media (max-width: 480px) {
            h1 { font-size: 1.2rem; letter-spacing: 3px; }
            .display-wrapper { height: 200px; }
        }

        .view-all { text-align: center; margin-top: 30px; }
        .view-all a { color: #000; text-decoration: none; border-bottom: 1px solid #000; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>VANTAGE LAW</h1>
        <p class="intro">尋求辯護律師嗎？<br>如果你在找一個麻煩的律師，看這裡。</p>
    </header>

    <section class="form-section">
        <div class="form-intro">&gt; 評分您的命運。</div>
        <form id="gform">
            <div class="stars-input">
                <input type="radio" id="s5" name="rating" value="5星"><label for="s5">★</label>
                <input type="radio" id="s4" name="rating" value="4星"><label for="s4">★</label>
                <input type="radio" id="s3" name="rating" value="3星"><label for="s3">★</label>
                <input type="radio" id="s2" name="rating" value="2星"><label for="s2">★</label>
                <input type="radio" id="s1" name="rating" value="1星"><label for="s1">★</label>
            </div>
            <textarea id="comment" placeholder="匿名證言 / TESTIMONY..." required></textarea>
            <button type="button" onclick="handleCustomSubmit()">Submit</button>
        </form>
    </section>

    <div class="display-wrapper">
        <div id="reviewDisplay"></div>
    </div>

    <div class="view-all">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdRyyw8BKgIsloQkhxEAqRBOUFS3MffXFZ1vNhI-f1zA5RoYw/viewanalytics" target="_blank">Archives →</a>
    </div>
</div>

<script>
    // 這裡我簡化了結構，實際上你可以在陣列中填滿各100則
    const responseLibrary = {
        s1: Array.from({length: 100}, (_, i) => `[SYSTEM]：1星評價已確認。處置：${["收債人已出發", "律師已授權對您進行智力監控", "這顆星留給您的墓碑吧", "建議您立刻申請破產，因為律師生氣很貴"][i % 4]}。`),
        s2: Array.from({length: 100}, (_, i) => `[SYSTEM]：2星評價已受理。備註：${["勉強及格的掙扎", "您的不滿對律師毫無影響", "建議增加諮詢費以換取同情", "檔案已移入『低價值投訴』"][i % 4]}。`),
        s3: Array.from({length: 100}, (_, i) => `[SYSTEM]：3星評價。系統判定：${["極度平庸的審美", "律師表示：『還可以更好，指錢的部分』", "中立等同於無能", "已自動忽略此無感證言"][i % 4]}。`),
        s4: Array.from({length: 100}, (_, i) => `[SYSTEM]：4星評價。狀態：${["偵測到微妙的崇拜", "律師收下了您的讚美，但不會降價", "您很有眼光，但還不夠極致", "檔案已標記為『潛在長約客戶』"][i % 4]}。`),
        s5: Array.from({length: 100}, (_, i) => `[SYSTEM]：5星評價。警報：${["偵測到盲目崇拜", "律師：『你的品味跟案情一樣令人不安』", "別以為好評能換取我的溫柔", "已將此用戶列入『好騙名單』"][i % 4]}。`)
    };

    const staticReviews = Array.from({length: 100}, (_, i) => ({
        text: [
            "他叫我閉嘴，他說他討厭任何會震動空氣的廢話。",
            "這是我見過最帥但也最混蛋的人。",
            "他說我的案子唯一的亮點就是我那愚蠢的勇氣。",
            "他在開庭前問我：『你準備好讓全城都知道你有多蠢了嗎？』",
            "委託他後，我覺得地獄都變得親切了。",
            "他說我的長相就是一種犯罪，建議直接認罪。",
            "他把我的卷宗拿去墊咖啡杯，留下一圈圈水漬。",
            "他說我的罪名應該再加上一條『浪費空氣』。",
            "他在法庭上大笑，因為對方律師絆倒了。",
            "他說：『除了錢，你沒有任何值得我多看一眼的東西。』"
        ][i % 10],
        note: `[SYSTEM]：歷史檔案編號 #${1000 + i}`
    }));

    let displayElement = document.getElementById('reviewDisplay');

    function showRandomReview() {
        displayElement.style.opacity = 0;
        setTimeout(() => {
            const rev = staticReviews[Math.floor(Math.random() * staticReviews.length)];
            displayElement.innerHTML = `
                <div class="review-stars">★☆☆☆☆</div>
                <div class="review-text">「${rev.text}」</div>
                <div class="review-subtext">${rev.note}</div>
            `;
            displayElement.style.opacity = 1;
        }, 500);
    }

    setInterval(showRandomReview, 4000);
    window.onload = showRandomReview;

    async function handleCustomSubmit() {
        const comment = document.getElementById('comment').value;
        const ratingInput = document.querySelector('input[name="rating"]:checked');
        if (!ratingInput || !comment) { alert("請填寫完整。"); return; }

        const rating = ratingInput.value;
        const starCount = parseInt(rating);
        const key = "s" + starCount;
        
        // 隨機選取該星等的一則回覆
        const responses = responseLibrary[key];
        const randomReply = responses[Math.floor(Math.random() * responses.length)];

        // Google Form 提交 (這部分邏輯不變)
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdRyyw8BKgIsloQkhxEAqRBOUFS3MffXFZ1vNhI-f1zA5RoYw/formResponse";
        const formData = new FormData();
        formData.append("entry.307929863", rating);
        formData.append("entry.1108477442", comment);
        fetch(formURL, { method: "POST", mode: "no-cors", body: formData });

        // 彈出律師的回覆
        alert(randomReply.replace("[SYSTEM]：", ""));

        // 更新顯示區域
        displayElement.style.opacity = 0;
        setTimeout(() => {
            let stars = "★".repeat(starCount) + "☆".repeat(5-starCount);
            displayElement.innerHTML = `
                <div class="review-stars">${stars}</div>
                <div class="review-text">「${comment}」</div>
                <div class="review-subtext">${randomReply}</div>
            `;
            displayElement.style.opacity = 1;
        }, 500);
        
        document.getElementById('comment').value = "";
    }
</script>
</body>
</html>
